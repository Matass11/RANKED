<h2>⚔️ Play Match</h2>

<form method="POST" action="/play-match">

  <h3>Team 1</h3>
  <input name="p1" placeholder="player 1">
  <input name="p2" placeholder="player 2">

  <h3>Team 2</h3>
  <input name="p3" placeholder="player 3">
  <input name="p4" placeholder="player 4">

  <h3>Score</h3>
  <input name="score1" placeholder="team 1 goals">
  <input name="score2" placeholder="team 2 goals">

  <button type="submit">Submit Match</button>

</form>
